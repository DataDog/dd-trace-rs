[workspace]
members = [
    "datadog-opentelemetry",
    "datadog-opentelemetry/examples/propagator",
    "datadog-opentelemetry/examples/simple_tracing",
]

# https://doc.rust-lang.org/cargo/reference/resolver.html#feature-resolver-version-2
resolver = "2"

[workspace.package]
rust-version = "1.84.1"
edition = "2021"
version = "0.3.2"
license = "Apache-2.0"
repository = "https://github.com/DataDog/dd-trace-rs"
readme = "README.md"
description = "Reserved future DataDog package, contact info@datadoghq.com if you think this package name shouldn't be used."
authors = ["Datadog Inc. <info@datadoghq.com>"]

[workspace.dependencies]
# Libdatadog dependencies - pinned to commit with extended heartbeat interval fix.
# TODO: revert to crates.io versions once the next libdatadog release (>v30.0.0) is published.
libdd-data-pipeline = { git = "https://github.com/DataDog/libdatadog", rev = "f1f0df1b5d9066a7fbff14524c04ca3636d778d6", default-features = false }
libdd-trace-utils = { git = "https://github.com/DataDog/libdatadog", rev = "f1f0df1b5d9066a7fbff14524c04ca3636d778d6", default-features = false }
libdd-telemetry = { git = "https://github.com/DataDog/libdatadog", rev = "f1f0df1b5d9066a7fbff14524c04ca3636d778d6", default-features = false }
libdd-common = { git = "https://github.com/DataDog/libdatadog", rev = "f1f0df1b5d9066a7fbff14524c04ca3636d778d6", default-features = false }
libdd-tinybytes = { git = "https://github.com/DataDog/libdatadog", rev = "f1f0df1b5d9066a7fbff14524c04ca3636d778d6", default-features = false }
opentelemetry_sdk = { version = "0.31.0", features = [
    "trace",
    "metrics",
    "logs",
], default-features = false }
opentelemetry = { version = "0.31.0", features = [
    "trace",
    "metrics",
    "logs",
], default-features = false }
opentelemetry-otlp = { version = "0.31.0", features = [
    "metrics",
    "logs",
], default-features = false }
opentelemetry-semantic-conventions = { version = "0.31.0", features = [
    "semconv_experimental",
] }
tokio = { version = "1.44.1" }
rand = { version = "0.8", features = ["small_rng"] }

serde = { version = "1.0.194" }
serde_json = { version = "1.0.140" }

hashbrown = { version = "0.15.5" }
foldhash = { version = "0.1.5" }


[profile.dev]
debug = 2 # full debug info

[profile.bench]
codegen-units = 1
debug = false
incremental = false
opt-level = 3

