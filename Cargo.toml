[workspace]
members = [
    "datadog-opentelemetry",
    "datadog-opentelemetry/examples/propagator",
    "datadog-opentelemetry/examples/simple_tracing",
    "tools",
]

# https://doc.rust-lang.org/cargo/reference/resolver.html#feature-resolver-version-2
resolver = "2"

[workspace.package]
rust-version = "1.87.0"
edition = "2021"
version = "0.4.0"
license = "Apache-2.0"
repository = "https://github.com/DataDog/dd-trace-rs"
readme = "README.md"
description = "Reserved future DataDog package, contact info@datadoghq.com if you think this package name shouldn't be used."
authors = ["Datadog Inc. <info@datadoghq.com>"]

[workspace.dependencies]
# Libdatadog dependencies - change to a stable version once we release
libdd-data-pipeline = { version = "6.0.0", features = [
    "stats-obfuscation",
    "telemetry",
], default-features = false }
libdd-trace-utils = { version = "8.0.0", default-features = false }
libdd-capabilities-impl = { version = "2.0.0", default-features = false }
libdd-telemetry = { version = "5.0.1", default-features = false }
libdd-common = { version = "4.2.0", default-features = false }
libdd-tinybytes = { version = "1.1.1", default-features = false }
libdd-library-config = { version = "2.0.0", default-features = false }
libdd-sampling = { version = "4.0.0", default-features = false }
# libdd-remote-config is not yet published to crates.io. Tracked via the
# [patch.crates-io] section below for any libdd-* crate co-resolved between
# crates.io and this git revision.
libdd-remote-config = { git = "https://github.com/DataDog/libdatadog", rev = "2e6214d80", default-features = false, features = [
    "client",
] }
opentelemetry_sdk = { version = "0.31.0", features = [
    "trace",
    "metrics",
    "logs",
], default-features = false }
opentelemetry = { version = "0.31.0", features = [
    "trace",
    "metrics",
    "logs",
], default-features = false }
opentelemetry-otlp = { version = "0.31.0", features = [
    "metrics",
    "logs",
], default-features = false }
opentelemetry-semantic-conventions = { version = "0.31.0", features = [
    "semconv_experimental",
] }
tokio = { version = "1.44.1" }
rand = { version = "0.8", features = ["small_rng"] }

serde = { version = "1.0.194" }
serde_json = { version = "1.0.140" }

hashbrown = { version = "0.15.5" }
foldhash = { version = "0.1.5" }


# libdd-remote-config depends on libdd-common and (optionally) libdd-trace-protobuf
# via path+version. Redirect their crates.io copies to the same libdatadog revision
# so cargo unifies the graph (otherwise we get duplicate libdd-common copies and
# type-mismatch errors at the boundary). Remove once libdd-remote-config is on
# crates.io with matching libdd-* versions.
[patch.crates-io]
libdd-data-pipeline = { git = "https://github.com/DataDog/libdatadog", rev = "2e6214d80" }
libdd-trace-utils = { git = "https://github.com/DataDog/libdatadog", rev = "2e6214d80" }
libdd-telemetry = { git = "https://github.com/DataDog/libdatadog", rev = "2e6214d80" }
libdd-common = { git = "https://github.com/DataDog/libdatadog", rev = "2e6214d80" }
libdd-tinybytes = { git = "https://github.com/DataDog/libdatadog", rev = "2e6214d80" }
libdd-capabilities-impl = { git = "https://github.com/DataDog/libdatadog", rev = "2e6214d80" }

[profile.dev]
debug = 2 # full debug info

[profile.bench]
codegen-units = 1
debug = false
incremental = false
opt-level = 3

