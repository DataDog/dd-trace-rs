name: Instrumentation
permissions:
  contents: read
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '00 03 * * 1-5'
env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.91.1

jobs:
  test:
    name: "instrumentation/aws cargo test (${{ matrix.platform }})"
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-14, windows-latest]
      fail-fast: false
    steps:
      - name: Free Disk Space (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust ${{ env.RUST_VERSION }}
        run: rustup install ${{ env.RUST_VERSION }} && rustup default ${{ env.RUST_VERSION }}
      - name: Cache
        uses: ./.github/actions/cache
        with:
          rust_version: ${{ env.RUST_VERSION }}
      - name: Install cargo nextest
        uses: taiki-e/install-action@955a6ff1416eae278c9f833008a9beb4b7f9afe3 # v2.49.15
        with:
          tool: nextest@0.9.81
      - name: cargo build
        run: cargo build --workspace --locked
        working-directory: instrumentation/aws
      - name: cargo nextest run
        run: cargo nextest run --workspace --locked
        working-directory: instrumentation/aws

  clippy:
    name: "instrumentation/aws clippy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust ${{ env.RUST_VERSION }} and clippy
        run: rustup install ${{ env.RUST_VERSION }} && rustup default ${{ env.RUST_VERSION }} && rustup component add clippy
      - name: Cache
        uses: ./.github/actions/cache
        with:
          rust_version: ${{ env.RUST_VERSION }}
      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
        working-directory: instrumentation/aws

  rustfmt:
    name: "instrumentation/aws rustfmt"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install nightly-2024-12-16 and rustfmt
        run: rustup install nightly-2024-12-16 && rustup default nightly-2024-12-16 && rustup component add rustfmt
      - name: Cache
        uses: ./.github/actions/cache
        with:
          rust_version: nightly-2024-12-16
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        working-directory: instrumentation/aws
